stages:
  - ci

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
    - when: never

ci:smoke:
  stage: ci
  image: alpine:3.19
  tags:
    - runner::mr
  variables:
    GIT_DEPTH: "0"
  script:
    - apk add --no-cache git
    - ./scripts/ci/smoke.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

ci:full:
  stage: ci
  image: alpine:3.19
  tags:
    - runner::protected
  variables:
    GIT_DEPTH: "0"
  script:
    - apk add --no-cache git
    - ./scripts/ci/full.sh
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
