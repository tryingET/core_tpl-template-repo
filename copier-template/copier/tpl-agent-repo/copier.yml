_subdirectory: ""
_answers_file: .copier-answers.yml
_templates_suffix: .j2

company_slug:
  type: str
  default: holdingco
  help: "Company slug for path derivation (e.g., holdingco, softwareco)"

company_name:
  type: str
  default: Holding Company
  help: "Company display name (e.g., Holding Company, Software Company)"

repo_slug:
  type: str
  help: "Repo slug (e.g. agent-triage)"

enable_community_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-agent-repo."

enable_release_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-agent-repo."

enable_vouch_gate:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-agent-repo."

core_owner_handle:
  type: str
  default: "@core-owner"
  help: "CODEOWNERS entry for core docs paths"

agent_owner_handle:
  type: str
  default: "@agent-owner"
  help: "CODEOWNERS entry for agent-owned paths"
