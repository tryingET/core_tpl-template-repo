_subdirectory: ""
_answers_file: .copier-answers.yml
_templates_suffix: .j2
_exclude:
  - "copier.yml"
  - "tools/rocs-cli/build"
  - "tools/rocs-cli/dist"
  - "tools/rocs-cli/.venv"
  - "tools/rocs-cli/src/*.egg-info"
  - "**/__pycache__"
  - "**/*.pyc"

company_slug:
  type: str
  default: holdingco
  help: "Company slug for path derivation (e.g., holdingco, softwareco)"

company_name:
  type: str
  default: Holding Company
  help: "Company display name (e.g., Holding Company, Software Company)"

repo_slug:
  type: str
  help: "Repo slug (e.g. proj-foo)"

location:
  type: str
  default: owned
  choices:
    - owned
    - contrib
    - infra
  help: "Location archetype: owned (company projects), contrib (upstream contributions), infra (infrastructure)"

language:
  type: str
  default: python
  choices:
    - python
    - node
    - typescript
    - rust
    - go
    - bash
  help: "Primary language for the project"

enable_software_pack:
  type: bool
  default: false
  help: "Enable software development scaffolding (pyproject.toml, package.json, etc.)"

enable_community_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo."

enable_release_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo."

enable_vouch_gate:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo."

kernel_ontology_ref:
  type: str
  default: "<gitlab:org/ontology-kernel@v0.1.0>"
  help: "ROCS core/kernel ontology ref (GitLab locator)"

company_ontology_ref:
  type: str
  default: "<gitlab:org/ontology@v0.1.0>"
  help: "ROCS company overlay ref (GitLab locator)"

core_owner_handle:
  type: str
  default: "@core-owner"
  help: "CODEOWNERS entry for core docs paths"

org_owner_handle:
  type: str
  default: "@org-owners"
  help: "CODEOWNERS entry for org-owned paths"

project_owner_handle:
  type: str
  default: "@project-owners"
  help: "CODEOWNERS entry for project-owned paths"

# Location-derived defaults (computed in templates, not exposed as params)
# owned -> typically @company-owners, release_pack=true
# contrib -> typically @contrib-team, release_pack=false  
# infra -> typically @infra-team, release_pack=false

_tasks:
  - "chmod +x scripts/ci/smoke.sh scripts/ci/full.sh scripts/rocs.sh 2>/dev/null || true"
  # Clean up empty/unused software pack files
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'python' ]; then rm -f pyproject.toml uv.lock 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'node' ]; then rm -f package.json package-lock.json 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'typescript' ]; then rm -f package.json tsconfig.json 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'rust' ]; then rm -f Cargo.toml Cargo.lock 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'go' ]; then rm -f go.mod go.sum 2>/dev/null; fi"
