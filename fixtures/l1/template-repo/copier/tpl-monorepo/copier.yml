_subdirectory: ""
_answers_file: .copier-answers.yml
_templates_suffix: .j2
_exclude:
  - "copier.yml"
  - "**/__pycache__"
  - "**/*.pyc"

company_slug:
  type: str
  default: holdingco
  help: "Company slug for path derivation (e.g., holdingco, softwareco)"

company_name:
  type: str
  default: Holding Company
  help: "Company display name (e.g., Holding Company, Software Company)"

repo_slug:
  type: str
  help: "Repo slug (e.g. dspx, platform-mono)"

# Note: Monorepos don't have a single language - each package in packages/ or apps/ 
# defines its own language when generated from tpl-package

package_manager:
  type: str
  default: uv
  choices:
    - uv
    - npm
    - pnpm
    - cargo
    - go-mod
  help: "Package manager for workspace"

org_docs_profile:
  type: str
  default: compact
  choices:
    - compact
    - rich
  help: "Depth of org-context docs under docs/org_context/."

enable_community_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-monorepo."

enable_release_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-monorepo."

enable_vouch_gate:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-monorepo."

kernel_ontology_ref:
  type: str
  default: "<gitlab:org/ontology-kernel@v0.1.0>"
  help: "ROCS core/kernel ontology ref (GitLab locator)"

company_ontology_ref:
  type: str
  default: "<gitlab:org/ontology@v0.1.0>"
  help: "ROCS company overlay ref (GitLab locator)"

core_owner_handle:
  type: str
  default: "@core-owner"
  help: "CODEOWNERS entry for core docs paths"

org_owner_handle:
  type: str
  default: "@org-owners"
  help: "CODEOWNERS entry for org-owned paths"

project_owner_handle:
  type: str
  default: "@project-owners"
  help: "CODEOWNERS entry for monorepo execution paths"

_tasks:
  - "if [ '{{ org_docs_profile }}' != 'rich' ]; then rm -f docs/org_context/mission.md docs/org_context/purpose.md docs/org_context/vision.md docs/org_context/strategic_objectives.md docs/org_context/governance.md 2>/dev/null; fi"
