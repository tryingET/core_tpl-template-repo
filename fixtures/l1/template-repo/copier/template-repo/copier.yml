_subdirectory: ""
_answers_file: .copier-answers.yml
_templates_suffix: .j2

repo_slug:
  type: str
  default: product-repo
  help: "Slug for the generated L2 repository."

owner_handle:
  type: str
  default: "@repo-owner"
  help: "Owner handle used in generated docs."

org_docs_profile:
  type: str
  default: compact
  choices:
    - compact
    - rich
  help: "Organization docs profile for this generated L2 repo."

org_docs_canonical_ref:
  type: str
  default: ""
  help: "Optional canonical organization docs URL/path referenced by compact L2 docs."

enable_vouch_gate:
  type: bool
  default: false
  help: "Enable vouch trust-gate workflows for this generated L2 repo."

enable_community_pack:
  type: bool
  default: false
  help: "Enable community collaboration baseline (issue templates, CoC, support docs)."

enable_release_pack:
  type: bool
  default: false
  help: "Enable release baseline (release-please, release checks, publish automation)."

_tasks:
  - "chmod +x scripts/install-hooks.sh scripts/ci/smoke.sh scripts/ci/full.sh scripts/release/check.sh scripts/release/publish.sh .githooks/pre-commit .githooks/pre-push"
  - "{{ 'true' if org_docs_profile == 'rich' else 'rm -f docs/org/purpose.md docs/org/mission.md docs/org/vision.md docs/org/strategic_objectives.md docs/org/values_ethics.md docs/org/governance.md docs/org/glossary.md' }}"
  - "{{ 'true' if enable_community_pack else 'rm -f CODE_OF_CONDUCT.md SUPPORT.md .github/pull_request_template.md .github/ISSUE_TEMPLATE/config.yml .github/ISSUE_TEMPLATE/bug-report.yml .github/ISSUE_TEMPLATE/feature-request.yml' }}"
  - "{{ 'true' if enable_release_pack else 'rm -f .github/workflows/release-please.yml .github/workflows/release-check.yml .github/workflows/publish.yml .release-please-config.json .release-please-manifest.json CHANGELOG.md SECURITY.md && rm -rf scripts/release' }}"

_message_after_copy: |
  L2 repository scaffolded at {{ _copier_conf.dst_path }}

  Next:
    - initialize git (if needed): git init -b main
    - install hooks:               ./scripts/install-hooks.sh
    - run smoke checks:            ./scripts/ci/smoke.sh

  Organization docs profile:
    - currently {{ org_docs_profile }}
    - toggle at generation time with: -d org_docs_profile=compact|rich
    - optional canonical link:      -d org_docs_canonical_ref=<url-or-path>

  Community pack:
    - currently {{ 'enabled' if enable_community_pack else 'disabled' }}
    - toggle at generation time with: -d enable_community_pack=true|false

  Release pack:
    - currently {{ 'enabled' if enable_release_pack else 'disabled' }}
    - toggle at generation time with: -d enable_release_pack=true|false

  Vouch trust-gate:
    - currently {{ 'enabled' if enable_vouch_gate else 'disabled' }}
    - toggle at generation time with: -d enable_vouch_gate=true|false
