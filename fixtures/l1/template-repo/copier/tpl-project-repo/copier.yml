_subdirectory: ""
_answers_file: .copier-answers.yml
_templates_suffix: .j2
_exclude:
  - "copier.yml"
  - "tools/rocs-cli/build"
  - "tools/rocs-cli/dist"
  - "tools/rocs-cli/.venv"
  - "tools/rocs-cli/src/*.egg-info"
  - "**/__pycache__"
  - "**/*.pyc"

_skip_if_exists:
  - "next_session_prompt.md"

company_slug:
  type: str
  default: holdingco
  help: "Company slug for path derivation (e.g., holdingco, softwareco)"

company_name:
  type: str
  default: Holding Company
  help: "Company display name (e.g., Holding Company, Software Company)"

repo_slug:
  type: str
  help: "Repo slug (e.g. proj-foo)"

location:
  type: str
  default: owned
  help: "Location/lane label: owned, contrib, infra, or a custom lane name (for example data-lane)."

language:
  type: str
  default: python
  choices:
    - python
    - node
    - typescript
    - rust
    - go
    - elixir
    - bash
  help: "Primary language for the project"

enable_software_pack:
  type: bool
  default: false
  help: "Enable software development scaffolding (pyproject.toml, package.json, etc.)"

org_docs_profile:
  type: str
  default: compact
  choices:
    - compact
    - rich
  help: "Depth of org-context docs under docs/org_context/."

enable_community_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo (no extra file overlays)."

enable_release_pack:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo (no extra file overlays)."

enable_vouch_gate:
  type: bool
  default: false
  help: "Inherited compatibility flag from L1 profile; currently metadata-only in tpl-project-repo (no extra file overlays)."

kernel_ontology_ref:
  type: str
  default: "<repo:core/ontology-kernel@main>"
  help: "ROCS core/kernel ontology ref (workspace repo locator)"

company_ontology_ref:
  type: str
  default: "<repo:{{ company_slug }}/ontology@main>"
  help: "ROCS company overlay ref (workspace repo locator)"

core_owner_handle:
  type: str
  default: "@core-owner"
  help: "CODEOWNERS entry for core docs paths"

org_owner_handle:
  type: str
  default: "@org-owners"
  help: "CODEOWNERS entry for org-owned paths"

project_owner_handle:
  type: str
  default: "@project-owners"
  help: "CODEOWNERS entry for project-owned paths"

# Location-derived defaults (computed in templates, not exposed as params)
# owned -> typically @company-owners, release_pack=true
# contrib -> typically @contrib-team, release_pack=false  
# infra -> typically @infra-team, release_pack=false

_tasks:
  - "chmod +x scripts/ci/smoke.sh scripts/ci/fast.sh scripts/ci/full.sh scripts/rocs.sh 2>/dev/null || true"
  # Clean up empty/unused software pack files
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'python' ]; then rm -f pyproject.toml uv.lock 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || ! printf '%s\n' '{{ language }}' | grep -Eq '^(node|typescript)$'; then rm -f package.json 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'node' ]; then rm -f package-lock.json 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'typescript' ]; then rm -f tsconfig.json 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'rust' ]; then rm -f Cargo.toml Cargo.lock 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'go' ]; then rm -f go.mod go.sum 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || [ '{{ language }}' != 'elixir' ]; then rm -f mix.exs 2>/dev/null; fi"
  - "if [ '{{ enable_software_pack }}' != 'True' ] || ! printf '%s\n' '{{ language }}' | grep -Eq '^(python|node|typescript|rust|go|elixir)$'; then rm -f policy/engineering-lane.json docs/engineering.local.md 2>/dev/null; fi"
  - "if [ '{{ org_docs_profile }}' != 'rich' ]; then rm -f docs/org_context/mission.md docs/org_context/purpose.md docs/org_context/vision.md docs/org_context/strategic_objectives.md docs/org_context/governance.md 2>/dev/null; fi"
