rocs:
  layers:
    - name: core
      ref: "<gitlab:org/ontology-kernel@v0.1.0>"
    - name: company
      ref: "<gitlab:org/ontology@v0.1.0>"
    - name: repo
      path: "ontology/src"
  profiles:
    default: "repo-dev"
    guiding-circle:
      include_layers: ["core", "company"]
      exclude_layers: ["repo"]
      budget: 1800
    repo-dev:
      include_layers: ["core", "company", "repo"]
      budget: 2800

