stages:
  - ci

include:
  - local: gitlab/ci/rocs.yml

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
    - when: never

ci:smoke:
  stage: ci
  image: alpine:3.19
  tags:
    - runner::mr
  variables:
    GIT_DEPTH: "0"
  script:
    - apk add --no-cache git
    - ./scripts/ci/smoke.sh
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

ci:full:
  stage: ci
  image: ghcr.io/astral-sh/uv:python3.11-bookworm-slim
  tags:
    - runner::protected
  variables:
    GIT_DEPTH: "0"
  script:
    - apt-get update
    - apt-get install -y --no-install-recommends ca-certificates git
    - rm -rf /var/lib/apt/lists/*
    - ./scripts/ci/full.sh
  artifacts:
    when: always
    paths:
      - ontology/dist/
  rules:
    - if: '$CI_COMMIT_REF_PROTECTED == "true"'
