_subdirectory: copier-template
_answers_file: .copier-answers.yml
_templates_suffix: .jinja

l1_profile:
  type: str
  default: template-repo
  choices:
    - template-repo
  help: "L1 profile to scaffold (first slice only)."

repo_slug:
  type: str
  default: template-repo-sample
  help: "Slug for the generated L1 template repository."

maintainer_handle:
  type: str
  default: "@template-owner"
  help: "Owner handle used in generated docs/contracts."

enable_vouch_gate:
  type: bool
  default: false
  help: "Enable vouch trust-gate baseline in generated L1/L2 repositories."

_tasks:
  - "chmod +x scripts/new-repo-from-copier.sh scripts/check-template-ci.sh scripts/install-hooks.sh scripts/ci/smoke.sh scripts/ci/full.sh .githooks/pre-commit .githooks/pre-push copier/template-repo/scripts/install-hooks.sh copier/template-repo/scripts/ci/smoke.sh copier/template-repo/scripts/ci/full.sh copier/template-repo/.githooks/pre-commit copier/template-repo/.githooks/pre-push"

_message_after_copy: |
  L1 template repository scaffolded at {{ _copier_conf.dst_path }}

  Next steps:
    - run: bash ./scripts/check-template-ci.sh
    - generate an L2 sample:
      ./scripts/new-repo-from-copier.sh template-repo /tmp/l2-sample -d repo_slug=l2-sample --defaults --overwrite

  Vouch trust-gate:
    - currently {{ 'enabled' if enable_vouch_gate else 'disabled' }}
    - toggle at generation time with: -d enable_vouch_gate=true|false
